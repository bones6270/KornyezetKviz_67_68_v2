<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tájékozódás</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#58cc02;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    background:white;
    width:95%;
    max-width:420px;
    border-radius:15px;
    padding:15px;
}

button {
    width:100%;
    padding:14px;
    margin:6px 0;
    font-size:16px;
    border-radius:10px;
    border:none;
}

.correct { background:#4CAF50;color:white;}
.wrong { background:#f44336;color:white;}

#progressBar {
    height:10px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:10px;
}
#progress { height:100%; background:#4CAF50; }

#avatar {
    font-size:42px;
    margin-bottom:10px;
    transition: transform 0.3s;
}

#message {
    color:#f44336;
    min-height:18px;
}

#levelup {
    color:#ff9800;
    font-weight:bold;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h3>🌍 Tájékozódás</h3>

<div id="menu">
<button onclick="newGame()">Új játék</button>
</div>

<div id="game"></div>
<div id="message"></div>
<div id="levelup"></div>
<div id="explanation"></div>
<button id="nextBtn" onclick="next()" style="display:none;">Tovább</button>

</div>

<script>

/* HANG */
function sound(freq){
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();
    o.frequency.value=freq;
    o.connect(ctx.destination);
    o.start();
    setTimeout(()=>o.stop(),150);
}

/* AVATAR */
function getAvatar(level){
    if(level<3) return "🐣";
    if(level<5) return "🐤";
    if(level<7) return "🐥";
    if(level<9) return "🐔";
    return "🦅";
}

/* KÉRDÉSEK */
const allQuestions=[ /* rövidítve itt, marad a 40-es lista */ 
{q:"Hány világtáj van?",a:["2","3","4","5"],c:2,e:"4 van."},
{q:"É jelentése?",a:["Kelet","Nyugat","Észak","Dél"],c:2,e:"É = észak."},
{q:"Mi mutat északra?",a:["Nap","Iránytű","Hold","Felhő"],c:1,e:"Iránytű."},
{q:"Hol van több moha?",a:["Dél","Észak","Kelet","Nyugat"],c:1,e:"Északon."}
];

let state={
questions:[],
current:0,
score:0,
level:1,
rounds:0,
used:[]
};

let answered=false;

/* GENERÁLÁS */
function generateQuestions(){

    if(state.used.length >= allQuestions.length){
        state.used=[]; // reset
    }

    let available = allQuestions.filter(q=>!state.used.includes(q.q));

    available.sort(()=>0.5-Math.random());

    let selected = available.slice(0,10);

    state.used.push(...selected.map(q=>q.q));

    return selected;
}

/* START */
function newGame(){
    state.questions=generateQuestions();
    state.current=0;
    state.score=0;
    document.getElementById("menu").style.display="none";
    show();
}

/* SHOW */
function show(){
    answered=false;
    document.getElementById("message").innerText="";
    document.getElementById("levelup").innerText="";

    let q=state.questions[state.current];

    if(!q){ newGame(); return; }

    let percent=(state.current/10)*100;

    let html=`
    <div id="avatar">${getAvatar(state.level)} Lv.${state.level}</div>
    <div id="progressBar"><div id="progress" style="width:${percent}%"></div></div>
    <p>${state.current+1}/10</p>
    <h3>${q.q}</h3>
    `;

    q.a.forEach((ans,i)=>{
        html+=`<button onclick="answer(${i})">${ans}</button>`;
    });

    document.getElementById("game").innerHTML=html;
}

/* ANSWER */
function answer(i){
    if(answered) return;
    answered=true;

    let q=state.questions[state.current];
    let btns=document.querySelectorAll("#game button");

    btns.forEach((b,index)=>{
        b.disabled=true;
        if(index===q.c) b.classList.add("correct");
        if(index===i && i!==q.c) b.classList.add("wrong");
    });

    if(i===q.c){
        state.score++;
        sound(600);
    } else {
        sound(200);
    }

    document.getElementById("explanation").innerHTML=`<b>${q.e}</b>`;
    document.getElementById("nextBtn").style.display="block";
}

/* NEXT */
function next(){
    if(!answered){
        document.getElementById("message").innerText="Válassz egy választ!";
        return;
    }

    state.current++;

    if(state.current<10){
        show();
    } else {
        endRound();
    }
}

/* END ROUND */
function endRound(){

    state.rounds++;

    if(state.rounds>=2){
        state.level++;
        state.rounds=0;

        document.getElementById("levelup").innerText="🎉 SZINTLÉPÉS!";
    }

    document.getElementById("game").innerHTML=
    `<h2>Kör vége!</h2>
     <p>${state.score}/10</p>
     <button onclick="newGame()">Következő kör</button>`;
}

</script>

</body>
</html>
