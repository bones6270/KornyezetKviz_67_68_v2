<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanuló App</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#58cc02;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    background:white;
    width:95%;
    max-width:420px;
    border-radius:15px;
    padding:15px;
}

button {
    width:100%;
    padding:14px;
    margin:6px 0;
    font-size:16px;
    border-radius:10px;
    border:none;
}

.correct { background:#4CAF50;color:white;}
.wrong { background:#f44336;color:white;}

#progressBar {
    height:10px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:10px;
}
#progress {
    height:100%;
    background:#4CAF50;
    width:0%;
}

#avatar {
    font-size:40px;
    margin-bottom:10px;
}

#message {
    color:#f44336;
    font-size:14px;
    min-height:18px;
}
</style>
</head>

<body>

<div class="container">

<h3>🌍 Tanuló App</h3>

<div id="menu">
<button onclick="newGame()">Új játék</button>
<button onclick="continueGame()">Folytatás</button>
</div>

<div id="game"></div>
<div id="message"></div>
<div id="explanation"></div>
<button id="nextBtn" onclick="next()" style="display:none;">Tovább</button>

</div>

<script>

/* AVATAR FEJLŐDÉS */
function getAvatar(level){
    if(level < 3) return "🐣";
    if(level < 5) return "🐤";
    if(level < 7) return "🐥";
    if(level < 9) return "🐔";
    return "🦅";
}

const allQuestions = [
{q:"Hány világtáj van?",a:["2","3","4","5"],c:2,e:"4 van."},
{q:"É jelentése?",a:["Kelet","Nyugat","Észak","Dél"],c:2,e:"É = észak."},
{q:"Mi mutat északra?",a:["Nap","Iránytű","Hold","Felhő"],c:1,e:"Iránytű."},
{q:"Hol van több moha?",a:["Dél","Észak","Kelet","Nyugat"],c:1,e:"Északon."}
];

let state = {
questions:[],
current:0,
score:0,
xp:0,
level:1,
weak:{}
};

let answered = false;

/* MENTÉS */
function save(){
    localStorage.setItem("quizState", JSON.stringify(state));
}

function load(){
    const data = localStorage.getItem("quizState");
    if(data){
        state = JSON.parse(data);
        return true;
    }
    return false;
}

/* ÚJ JÁTÉK */
function newGame(){
    state.questions = generateQuestions();
    state.current = 0;
    state.score = 0;

    document.getElementById("menu").style.display="none";
    show();
}

/* FOLYTATÁS */
function continueGame(){
    if(load()){
        document.getElementById("menu").style.display="none";
        show();
    } else {
        showMessage("Nincs mentett játék.");
    }
}

/* ADAPTÍV */
function generateQuestions(){
    let pool = [];

    allQuestions.forEach(q=>{
        let weight = state.weak[q.q] ? 3 : 1;
        for(let i=0;i<weight;i++) pool.push(q);
    });

    pool = pool.sort(()=>0.5-Math.random());

    while(pool.length < 10){
        pool = pool.concat(pool);
    }

    return pool.slice(0,10);
}

/* KÉRDÉS */
function show(){
    answered = false;
    showMessage("");

    let q = state.questions[state.current];
    let percent = (state.current/10)*100;

    let html = `
    <div id="avatar">${getAvatar(state.level)} Lv.${state.level}</div>
    <div id="progressBar"><div id="progress" style="width:${percent}%"></div></div>
    <p>${state.current+1}/10</p>
    <h3>${q.q}</h3>
    `;

    q.a.forEach((ans,i)=>{
        html+=`<button onclick="answer(${i})">${ans}</button>`;
    });

    document.getElementById("game").innerHTML=html;
    document.getElementById("nextBtn").style.display="none";

    save();
}

/* VÁLASZ */
function answer(i){
    if(answered) return;
    answered = true;

    let q = state.questions[state.current];
    let buttons=document.querySelectorAll("#game button");

    buttons.forEach((btn,index)=>{
        btn.disabled=true;
        if(index===q.c) btn.classList.add("correct");
        if(index===i && i!==q.c) btn.classList.add("wrong");
    });

    if(i===q.c){
        state.score++;
        state.xp++;
    } else {
        state.weak[q.q] = true;
    }

    if(state.xp >= 5){
        state.level++;
        state.xp = 0;
    }

    document.getElementById("explanation").innerHTML =
        `<b>${q.e}</b>`;

    document.getElementById("nextBtn").style.display="block";

    save();
}

/* TOVÁBB */
function next(){

    if(!answered){
        showMessage("Válassz egy választ!");
        return;
    }

    state.current++;

    if(state.current < 10){
        show();
    } else {
        end();
    }
}

/* VÉGE */
function end(){

    document.getElementById("game").innerHTML =
    `<h2>Kész!</h2>
     <p>${state.score}/10</p>
     <p>Szint: ${state.level}</p>
     <button onclick="newGame()">Új játék</button>`;

    document.getElementById("nextBtn").style.display="none";
    document.getElementById("explanation").innerHTML="";
    showMessage("");

    state.questions = [];
    state.current = 0;
    state.score = 0;

    save();
}

/* ÜZENET */
function showMessage(msg){
    document.getElementById("message").innerText = msg;
}

</script>

</body>
</html>
